name: DB CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
      - 'schema/**'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finly_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: finly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate schema
        run: |
          PGPASSWORD=testpass psql -h localhost -U finly_test -d finly_test -f schema/001_initial_schema.sql
        env:
          PGPASSWORD: testpass

      - name: Validate migrations
        run: |
          for f in migrations/*.sql; do
            echo "Running $f..."
            PGPASSWORD=testpass psql -h localhost -U finly_test -d finly_test -f "$f"
          done

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=finly-db
            -Dsonar.sources=.
        continue-on-error: true

  deploy:
    name: Deploy
    needs: [build, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run migrations on production
        if: github.ref == 'refs/heads/main'
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql "${{ secrets.DATABASE_URL }}" -f "$f"
          done
